name: Sync Model Knowledge

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Update model docs from scvi-tools main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install scvi-tools + dev deps
        run: pip install -e ".[dev,scvi]"

      - name: Clone scvi-tools (latest main)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/scverse/scvi-tools.git /tmp/scvi-tools
          git -C /tmp/scvi-tools sparse-checkout set docs/user_guide
          echo "Cloned scvi-tools at $(git -C /tmp/scvi-tools rev-parse --short HEAD)"

      - name: Check if update needed
        id: check
        run: |
          SHA=$(git -C /tmp/scvi-tools rev-parse --short HEAD)
          SYNCED=$(cat src/scvi_tools_mcp/knowledge/.last_synced_commit 2>/dev/null || echo "none")
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "synced=$SYNCED" >> "$GITHUB_OUTPUT"
          if [ "$SYNCED" = "$SHA" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate model API knowledge
        if: steps.check.outputs.needed == 'true'
        run: python scripts/extract_api_docs.py --docs-dir /tmp/scvi-tools/docs/user_guide

      - name: Sync user guide docs
        if: steps.check.outputs.needed == 'true'
        run: |
          cp /tmp/scvi-tools/docs/user_guide/use_case/*.md src/scvi_tools_mcp/knowledge/user_guide/ 2>/dev/null || true

      - name: Update last-synced commit
        if: steps.check.outputs.needed == 'true'
        run: echo "${{ steps.check.outputs.sha }}" > src/scvi_tools_mcp/knowledge/.last_synced_commit

      - name: Check for changes
        if: steps.check.outputs.needed == 'true'
        id: diff
        run: |
          if git status --porcelain src/scvi_tools_mcp/knowledge/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.check.outputs.needed == 'true' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync model knowledge from scvi-tools@${{ steps.check.outputs.sha }}"
          branch: chore/sync-models-${{ github.run_id }}
          title: "chore: sync model knowledge from scvi-tools@${{ steps.check.outputs.sha }}"
          body: |
            Automated model knowledge sync from scvi-tools main.

            Commit: scverse/scvi-tools@${{ steps.check.outputs.sha }}
            Previous synced: ${{ steps.check.outputs.synced }}

            Re-runs `scripts/extract_api_docs.py` with user guide docs from main.
            Also syncs `knowledge/user_guide/` from `docs/user_guide/use_case/`.
            Review changes before merging.
          labels: automated
