name: Sync Tutorials

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Fetch + convert new notebooks from scvi-tutorials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Clone scvi-tutorials (latest main)
        run: |
          git clone --depth 1 https://github.com/scverse/scvi-tutorials.git /tmp/scvi-tutorials
          echo "Cloned scvi-tutorials at $(git -C /tmp/scvi-tutorials rev-parse --short HEAD)"

      - name: Convert notebooks to markdown
        run: python scripts/convert_notebooks.py --src /tmp/scvi-tutorials --dst src/scvi_tools_mcp/knowledge/tutorials

      - name: Check for changes
        id: diff
        run: |
          if git status --porcelain src/scvi_tools_mcp/knowledge/tutorials/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get scvi-tutorials commit
        if: steps.diff.outputs.changed == 'true'
        id: version
        run: |
          SHA=$(git -C /tmp/scvi-tutorials rev-parse --short HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync tutorials from scvi-tutorials@${{ steps.version.outputs.sha }}"
          branch: chore/sync-tutorials-${{ github.run_id }}
          title: "chore: sync tutorials from scvi-tutorials@${{ steps.version.outputs.sha }}"
          body: |
            Monthly automated sync of tutorial notebooks from scvi-tutorials main.

            Commit: scverse/scvi-tutorials@${{ steps.version.outputs.sha }}

            Notebooks are converted to Markdown with outputs stripped (code + prose only).
          labels: automated
