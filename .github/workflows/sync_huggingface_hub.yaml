name: Sync Hugging Face Hub

on:
  schedule:
    - cron: "0 6 1 */3 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Refresh scvi-tools Hugging Face Hub snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Hugging Face hub scraper
        run: python scripts/scrape_huggingface_hub.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/scvi_tools_mcp/knowledge/hub/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync scvi-tools Hugging Face hub snapshot"
          branch: chore/sync-huggingface-hub-${{ github.run_id }}
          title: "chore: sync scvi-tools Hugging Face hub snapshot"
          body: |
            Quarterly automated refresh of the scvi-tools Hugging Face Hub model registry.

            Run `python scripts/scrape_huggingface_hub.py` locally to reproduce.
          labels: automated
