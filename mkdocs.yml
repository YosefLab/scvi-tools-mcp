site_name: scvi-tools MCP
site_description: Model Context Protocol server for scvi-tools — deep probabilistic analysis of single-cell omics data
site_url: https://scvi-tools-mcp.readthedocs.io
repo_url: https://github.com/YosefLab/scvi-tools-mcp
repo_name: YosefLab/scvi-tools-mcp

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
  palette:
    - scheme: default
      primary: indigo

nav:
  - Home: README.md
  - Installation: docs/installation.md
  - FAQ: docs/faq.md
  - References: docs/references.md

plugins:
  - search
